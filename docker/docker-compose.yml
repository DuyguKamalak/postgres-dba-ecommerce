version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_dba
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: dba_admin
      POSTGRES_PASSWORD: dba_password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/schema:/docker-entrypoint-initdb.d
      - ../data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_admin -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_dba
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dba.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
